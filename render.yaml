services:
  # Service 1: Ollama (LLM Server)
  - type: web
    name: intellitrack-ollama
    image: ollama/ollama:latest
    plan: free
    port: 11434
    dockerCommand: ollama serve
    envVars:
      - key: OLLAMA_HOST
        value: "0.0.0.0:11434"

  # Service 2: Qdrant (Vector Database)
  - type: web
    name: intellitrack-qdrant
    image: qdrant/qdrant:latest
    plan: free
    port: 6333
    envVars:
      - key: QDRANT_API_KEY
        value: ""
    volumes:
      - name: qdrant-storage
        mountPath: /qdrant/storage

  # Service 3: FastAPI (IntelliTrack LLM Service)
  - type: web
    name: intellitrack-llm
    image: docker.io/deeru2001/intellitrack-llm:latest
    plan: free
    port: 8000
    healthCheckPath: /health
    envVars:
      - key: PYTHONUNBUFFERED
        value: "1"
      - key: OLLAMA_URL
        value: "http://intellitrack-ollama.onrender.com:11434"
      - key: QDRANT_URL
        value: "http://intellitrack-qdrant.onrender.com:6333"
      - key: QDRANT_API_KEY
        value: ""
      - key: GITHUB_TOKEN
        value: ""
