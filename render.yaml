services:
  - type: web
    name: intellitrack-llm
    runtime: python
    plan: free
    pythonVersion: 3.11
    buildCommand: pip install -r requirements.txt
    startCommand: python -m uvicorn main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: PYTHONUNBUFFERED
        value: "1"
      - key: LM_STUDIO_URL
        value: # Add your LM Studio server URL here (e.g., http://your-server:1234)
      - key: QDRANT_URL
        value: # Add your Qdrant server URL here (e.g., http://your-qdrant:6333)
      - key: GITHUB_TOKEN
        value: # Optional: GitHub token for rate limiting
